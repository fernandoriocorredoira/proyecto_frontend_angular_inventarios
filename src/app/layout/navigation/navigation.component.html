<mat-sidenav-container class="sidenav-container">
  <mat-sidenav
    #drawer
    class="sidenav"
    fixedInViewport
    [attr.role]="(isHandset$ | async) ? 'dialog' : 'navigation'"
    [mode]="(isHandset$ | async) ? 'over' : 'side'"
    [opened]="(isHandset$ | async) === false"
  >
    <mat-toolbar>Menu</mat-toolbar>
    <mat-nav-list>
      <a mat-list-item routerLink="/admin" >ADMINISTRACIÓN</a>
      <a mat-list-item routerLink="/admin/perfil" >PERFIL</a>
      <a mat-list-item routerLink="/admin/usuarios" >USUARIOS</a>
    </mat-nav-list>
    
    <mat-list-item>
      <mat-icon>dashboard</mat-icon> <span>Gestión</span>
    </mat-list-item>

    <mat-expansion-panel [class.mat-elevation-z0]="true">
      <mat-expansion-panel-header>
        Inventarios
      </mat-expansion-panel-header>
      <mat-nav-list>
        <a mat-list-item routerLink="/admin/perfil" >CATEGORIA</a>
        <a mat-list-item routerLink="/admin/usuarios" >PRODUCTOS</a>
      </mat-nav-list>

    </mat-expansion-panel>
  </mat-sidenav>
  <mat-sidenav-content>
    <mat-toolbar color="primary">

      @if (isHandset$ | async) {
        <button type="button" aria-label="Toggle sidenav" matIconButton (click)="drawer.toggle()">
          <mat-icon aria-label="Side nav toggle icon">menu</mat-icon>
        </button>
      }
      <span>Mi Empresa</span>
    </mat-toolbar>
    <!-- Add Content Here -->
     <router-outlet />

  </mat-sidenav-content>
</mat-sidenav-container>
